<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXTINCTION IS COMING</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>EXTINCTION IS COMING.</h1>

    <section class="intro">
      <p>We started seeing the lines.</p>
      <p>The lines became a structure.</p>
      <p>Cyclopia was built.</p>
      <p>We are accepting new citizens.</p>
    </section>

    <button id="enterBtn">Enter Cyclopia</button>

    <section id="result" class="hidden"></section>

    <section class="population">
      <h2>Cyclopia Population</h2>
      <div id="count">0</div>
    </section>

    <section>
      <h2>Recent Citizens</h2>
      <div id="citizenList"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
